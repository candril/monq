name: ✅ CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsgo --noEmit

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run fmt:check

      - name: Build
        run: bun scripts/build.ts
